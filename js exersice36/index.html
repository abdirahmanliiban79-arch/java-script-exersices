<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color picker</title>

     <style>
        #colorPreview {
            width: 200px;
            height: 200px;
            margin: 20px 0;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #colorHistory {
            list-style: none;
            padding: 0;
        }
        #colorHistory li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>interactive Color picker</h1>

    <label for="colorPicker">Choose color:</label>
    <input type="color" id="colorPicker">

    <div id="colorPreview">Color preview</div>

    <h3>Color history</h3>
    <ul id="colorHistory"></ul>

    <button id="deleteHistoryColor">Deletecolor histroy </button>

    <script src="main.js"></script>
</body>
</html>
