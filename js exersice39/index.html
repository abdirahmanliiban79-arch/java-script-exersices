<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate your language</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">Language Translator</div>
        <form class="action">
            <span>From:</span>
            <select id="Old-language">
            <!-- <option id="old"></option> -->
            </select><br>
            <span>To:</span>
            <select id="New-language">
            <!-- <option id="new"></option> -->
            </select><br>
            <span>Taxt To Translate:</span>
            <textarea id="words" placeholder="Put Your Words here To Translate"></textarea><br>
            <button class="btn">Translate</button><br>
        </form>

        <div class="Final-text">Transalated Text:</div><br>

    </div>


    <script src="main.js"></script>
</body>
</html>
