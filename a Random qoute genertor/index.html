<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quote Generator | iOS 18 Style</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="glass-container">
        <header>
            <h1>Daily Inspiration</h1>
            <p>Unlock wisdom with a single click</p>
        </header>

        <main class="quote-display">
            <p id="words" class="quote-text">"The best way to predict your future is to create it."</p>
            <p id="author" class="quote-author">— Abraham Lincoln</p>
        </main>

        <button id="generate-btn" class="ios-button">
            Generate Next
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
